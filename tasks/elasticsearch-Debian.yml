---

- name: set fact force_install to no
  set_fact:
    force_install: false

- name: set fact force_install to yes
  set_fact:
    force_install: true
  when: es_allow_downgrades | bool

- name: Gracefully stop and remove elasticsearch package if switching between OSS and standard
  become: yes
  block:
  - name: Check if the elasticsearch package is installed
    shell: "dpkg-query -W -f'${Status}' {{ es_other_package_name }}"
    register: elasticsearch_package
    failed_when: False
    changed_when: False
    check_mode: no

  - name: unhold elasticsearch package when switching to a different package type
    become: yes
    dpkg_selections:
      name: "{{ es_other_package_name }}"
      selection: "install"
    when: elasticsearch_package.stdout == 'install ok installed'

  - name: stop elasticsearch
    service:
      name: 'elasticsearch'
      state: stopped
    when: elasticsearch_package.stdout == 'install ok installed'

  - name: Debian - Remove elasticsearch package if we are switching to a different package type
    apt:
      name: '{{ es_other_package_name }}'
      state: absent
    when: elasticsearch_package.stdout == 'install ok installed'


- name: Install Elasticsearch repository
  when: es_use_repository | bool
  become: yes
  block:
  - name: Debian - Install apt-transport-https to support https APT downloads
    apt:
      name: apt-transport-https
      state: present
    when: es_add_repository | bool

  - name: Debian - Remove legacy Elasticsearch repository files
    file:
      path: "{{ item }}"
      state: absent
    when: es_add_repository | bool
    loop:
      - "/etc/apt/sources.list.d/artifacts_elastic_co_packages_{{ es_repo_name | regex_replace('[^A-Za-z0-9]+', '_') }}_apt.list"
      - "/etc/apt/sources.list.d/artifacts_elastic_co_packages_{{ es_other_repo_name | regex_replace('[^A-Za-z0-9]+', '_') }}_apt.list"
      - "/etc/apt/sources.list.d/packages_elastic_co_elasticsearch_{{ es_repo_name | regex_replace('[^A-Za-z0-9]+', '_') }}_debian.list"
      - "/etc/apt/sources.list.d/packages_elastic_co_elasticsearch_{{ es_other_repo_name | regex_replace('[^A-Za-z0-9]+', '_') }}_debian.list"
      - "/etc/apt/sources.list.d/elastic-{{ es_repo_name }}.list"
      - "/etc/apt/sources.list.d/elastic-{{ es_other_repo_name }}.list"
      - /etc/apt/sources.list.d/elasticsearch.list
      - /etc/apt/sources.list.d/elastic.list
    register: es_legacy_repositories

  - name: Debian - Add elasticsearch repository
    ansible.builtin.deb822_repository:
      name: elasticsearch
      types: deb
      uris: "{{ es_repo_base }}/packages/{{ es_repo_name }}/apt"
      suites: stable
      components: main
      signed_by: "{{ es_apt_key | default(omit, true) }}"
      state: present
    when:
      - es_add_repository | bool
    register: es_repository

  - name: Debian - Update APT cache after Elasticsearch repository change
    apt:
      update_cache: yes
    when:
      - es_add_repository | bool
      - es_repository.changed or es_legacy_repositories.changed

- name: Include optional user and group creation.
  when: (es_user_id is defined) and (es_group_id is defined)
  include_tasks: elasticsearch-optional-user.yml

- name: Debian - Get installed elasticsearch version
  command: dpkg-query --showformat='${Version}' --show {{ es_package_name }}
  register: installed_es_version
  failed_when: False
  changed_when: False
  check_mode: no

- name: Debian - unhold elasticsearch version
  become: yes
  dpkg_selections:
    name: "{{ es_package_name }}"
    selection: "install"
  when: >
    (not es_version_lock | bool) or
    (
      (installed_es_version.stdout | default('') | length) > 0 and
      installed_es_version.stdout != es_version
    )

- name: Debian - Ensure elasticsearch is installed
  become: yes
  apt:
    name: '{{ es_package_name }}{% if es_version is defined and es_version != "" %}={{ es_version }}{% endif %}'
    state: present
    force: '{{ force_install | bool }}'
    allow_unauthenticated: "{{ 'no' if es_apt_key else 'yes' }}"
    cache_valid_time: 86400
  when: es_use_repository | bool
  register: debian_elasticsearch_install_from_repo
  notify: restart elasticsearch
  environment:
    ES_PATH_CONF: "{{ es_conf_dir }}"

- name: Debian - hold elasticsearch version
  become: yes
  dpkg_selections:
    name: "{{ es_package_name }}"
    selection: "hold"
  when: es_version_lock | bool

# workaround due to https://github.com/ansible/ansible/issues/66977
- set_fact:
    es_deb_url: "{% if es_version is version('7.0.0', '>=') %}{{ es_package_url }}-{{ es_version }}-amd64.deb{% else %}{{ es_package_url }}-{{ es_version }}.deb{% endif %}"

- name: Debian - Install Elasticsearch from url
  become: yes
  apt:
    deb: "{% if es_custom_package_url is defined %}{{ es_custom_package_url }}{% else %}{{ es_deb_url }}{% endif %}"
    state: present
  when: not es_use_repository | bool
  register: elasticsearch_install_from_package
  notify: restart elasticsearch
  environment:
    ES_PATH_CONF: "{{ es_conf_dir }}"
